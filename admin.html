<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Rifa Bicicleta (Doble Oportunidad)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
      line-height: 1.6;
      padding: 15px;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
    }

    header {
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #c62828;
      font-size: 1.5em;
      margin-bottom: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .stat-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .stat-number {
      font-size: 1.8em;
      font-weight: bold;
      color: #c62828;
    }

    .stat-label {
      font-size: 0.8em;
      color: #666;
      margin-top: 5px;
    }

    .tabs {
      display: flex;
      background: white;
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      background: #f8f9fa;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9em;
    }

    .tab.active {
      background: #c62828;
      color: white;
    }

    .search-bar {
      width: 100%;
      padding: 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      margin-bottom: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 1em;
    }

    .search-bar:focus {
      outline: none;
      border-color: #c62828;
    }

    .content {
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      min-height: 300px;
      max-height: 60vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .ticket-item {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      border-left: 4px solid #c62828;
    }

    .ticket-item.pagado {
      border-left-color: #28a745;
      background: #d4edda;
    }

    .ticket-item.reservado {
      border-left-color: #ffc107;
      background: #fff3cd;
    }

    .ticket-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .numeros {
      font-weight: bold;
      font-size: 1.1em;
      color: #c62828;
    }

    .estado {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.8em;
      font-weight: bold;
    }

    .estado.pagado {
      background: #28a745;
      color: white;
    }

    .estado.reservado {
      background: #ffc107;
      color: #856404;
    }

    .info {
      font-size: 0.9em;
      color: #666;
    }

    .fecha {
      font-size: 0.8em;
      color: #999;
      margin-top: 5px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.8em;
      transition: all 0.3s;
      flex: 1;
    }

    .btn-marcar-pagado {
      background: #28a745;
      color: white;
    }

    .btn-reactivar {
      background: #17a2b8;
      color: white;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: #666;
    }

    .empty-state i {
      font-size: 2em;
      margin-bottom: 10px;
      display: block;
    }

    /* Grid de números disponibles (100 números) */
    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
      padding: 5px;
    }

    .grid-number {
      padding: 10px 5px;
      text-align: center;
      border: 2px solid #c62828;
      border-radius: 8px;
      font-weight: 600;
      background: white;
      font-size: 0.9em;
    }

    .grid-number.disponible {
      background: #f8f9fa;
      color: #c62828;
    }

    .grid-number.ocupado {
      background: #6c757d;
      color: white;
      border-color: #6c757d;
    }

    @media (max-width: 480px) {
      .numbers-grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 5px;
      }
      
      .grid-number {
        padding: 8px 3px;
        font-size: 0.85em;
      }
      
      .tab {
        padding: 10px 8px;
        font-size: 0.8em;
      }
      
      .content {
        max-height: 50vh;
      }
    }

    .content::-webkit-scrollbar {
      width: 6px;
    }

    .content::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .content::-webkit-scrollbar-thumb {
      background: #c62828;
      border-radius: 10px;
    }

    @media (min-height: 800px) {
      .content {
        max-height: 65vh;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚲 Admin Rifa Bicicleta - Doble Oportunidad</h1>
      <p>Panel de control - Pedro Nel Sabogal | 50 boletas (2 números cada una)</p>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="total-pagados">0</div>
        <div class="stat-label">Pagados</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="total-reservados">0</div>
        <div class="stat-label">Reservados</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="total-disponibles">50</div>
        <div class="stat-label">Boletas Disponibles</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="total-recaudado">$0</div>
        <div class="stat-label">Recaudado</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="mostrarTab('pagados')">✅ Pagados</button>
      <button class="tab" onclick="mostrarTab('reservados')">⏰ Reservados</button>
      <button class="tab" onclick="mostrarTab('disponibles')">🔢 Números Disponibles</button>
      <button class="tab" onclick="mostrarTab('todos')">📋 Todos</button>
    </div>

    <input type="text" class="search-bar" id="search" placeholder="🔍 Buscar por nombre, teléfono o números..." onkeyup="filtrarLista()">

    <div class="content">
      <div id="lista-tickets" class="loading">
        Cargando datos...
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <script>
    // Configuración de Firebase (misma)
    const firebaseConfig = {
      apiKey: "AIzaSyCvNhHpsbjinSUFRK3HTDJCCnVFh4DVoXI",
      authDomain: "rifa-misaga.firebaseapp.com",
      databaseURL: "https://rifa-misaga-default-rtdb.firebaseio.com",
      projectId: "rifa-misaga",
      storageBucket: "rifa-misaga.firebasestorage.app",
      messagingSenderId: "495411826218",
      appId: "1:495411826218:web:5fb2d24364b496d0cfbd53",
      measurementId: "G-CNPG01QT6H"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let todosLosTickets = [];
    let tabActual = 'pagados';
    const TOTAL_TICKETS = 50;
    const PRECIO_BOLETA = 10000;

    // Función para actualizar estadísticas
    function actualizarEstadisticas() {
      let pagados = 0;
      let reservados = 0;
      let recaudado = 0;

      todosLosTickets.forEach(ticket => {
        if (ticket.estado === 'pagado') {
          pagados++;
          recaudado += PRECIO_BOLETA;
        } else if (ticket.estado === 'reservado') {
          reservados++;
        }
      });

      document.getElementById('total-pagados').textContent = pagados;
      document.getElementById('total-reservados').textContent = reservados;
      document.getElementById('total-disponibles').textContent = TOTAL_TICKETS - (pagados + reservados);
      document.getElementById('total-recaudado').textContent = `$${recaudado.toLocaleString()}`;
    }

    // Cargar todos los tickets
    function cargarDatos() {
      const lista = document.getElementById('lista-tickets');
      lista.innerHTML = '<div class="loading">Cargando datos...</div>';

      db.collection('tickets').orderBy('timestamp', 'desc').get().then(snapshot => {
        todosLosTickets = [];
        
        snapshot.forEach(doc => {
          const data = doc.data();
          todosLosTickets.push({
            id: doc.id,
            ...data,
            fecha: data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : 'Sin fecha'
          });
        });

        actualizarEstadisticas();
        mostrarLista();
        
      }).catch(error => {
        console.error('Error cargando datos:', error);
        document.getElementById('lista-tickets').innerHTML = '<div class="empty-state">❌ Error cargando datos</div>';
      });
    }

    // Mostrar lista según la pestaña
    function mostrarLista() {
      let ticketsFiltrados = [];

      switch(tabActual) {
        case 'pagados':
          ticketsFiltrados = todosLosTickets.filter(t => t.estado === 'pagado');
          break;
        case 'reservados':
          ticketsFiltrados = todosLosTickets.filter(t => t.estado === 'reservado');
          break;
        case 'todos':
          ticketsFiltrados = todosLosTickets;
          break;
        case 'disponibles':
          mostrarNumerosDisponibles();
          return;
      }

      const lista = document.getElementById('lista-tickets');
      
      if (ticketsFiltrados.length === 0) {
        lista.innerHTML = `<div class="empty-state">📭 No hay boletas ${tabActual === 'todos' ? '' : tabActual}</div>`;
        return;
      }

      lista.innerHTML = ticketsFiltrados.map(ticket => {
        let botones = '';
        
        if (ticket.estado === 'reservado') {
          botones = `
            <div class="actions">
              <button class="btn btn-marcar-pagado" onclick="marcarComoPagado('${ticket.id}', '${ticket.numeros.join(', ')}', '${ticket.nombre || ''}', '${ticket.metodo_pago || 'efectivo'}')">
                ✅ Marcar como Pagado
              </button>
              <button class="btn btn-reactivar" onclick="reactivarTicket('${ticket.id}', '${ticket.numeros.join(', ')}', '${ticket.nombre || ''}')">
                🔄 Reactivar
              </button>
            </div>
          `;
        } else if (ticket.estado === 'pagado') {
          botones = `
            <div class="actions">
              <button class="btn btn-reactivar" onclick="reactivarTicket('${ticket.id}', '${ticket.numeros.join(', ')}', '${ticket.nombre || ''}')">
                🔄 Reactivar
              </button>
            </div>
          `;
        }

        return `
          <div class="ticket-item ${ticket.estado}">
            <div class="ticket-header">
              <div class="numeros">Boleta #${ticket.numeros.join(' - ')}</div>
              <div class="estado ${ticket.estado}">
                ${ticket.estado === 'pagado' ? '✅ Pagado' : '⏰ Reservado'}
              </div>
            </div>
            <div class="info">
              <strong>${ticket.nombre || 'Sin nombre'}</strong><br>
              📞 ${ticket.telefono || 'Sin teléfono'}<br>
              💳 ${ticket.metodo_pago || 'No especificado'}
            </div>
            <div class="fecha">${ticket.fecha}</div>
            ${botones}
          </div>
        `;
      }).join('');
    }

    // Mostrar números disponibles (100 números, coloreados según ocupados)
    function mostrarNumerosDisponibles() {
      // Obtener todos los números ocupados de todos los tickets
      const numerosOcupados = new Set();
      todosLosTickets.forEach(ticket => {
        ticket.numeros.forEach(num => numerosOcupados.add(num));
      });
      
      const lista = document.getElementById('lista-tickets');
      
      let contenido = '<h3 style="margin-bottom: 15px; color: #c62828; text-align: center;">Estado de Números (00-99)</h3>';
      contenido += '<div class="numbers-grid">';
      
      for (let i = 0; i < 100; i++) {
        const num = i.toString().padStart(2, '0');
        const ocupado = numerosOcupados.has(num);
        
        contenido += `
          <div class="grid-number ${ocupado ? 'ocupado' : 'disponible'}">
            ${num}
          </div>
        `;
      }
      
      contenido += '</div>';
      lista.innerHTML = contenido;
    }

    // Filtrar lista
    function filtrarLista() {
      const searchTerm = document.getElementById('search').value.toLowerCase();
      if (tabActual === 'disponibles') return;
      const items = document.querySelectorAll('.ticket-item');
      items.forEach(item => {
        const text = item.textContent.toLowerCase();
        item.style.display = text.includes(searchTerm) ? 'block' : 'none';
      });
    }

    // Cambiar pestaña
    function mostrarTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[onclick="mostrarTab('${tab}')"]`).classList.add('active');
      tabActual = tab;
      mostrarLista();
    }

    // Marcar como Pagado
    async function marcarComoPagado(docId, numerosStr, nombre, metodoPagoActual) {
      const metodoPago = prompt(
        `💰 Marcar boleta (${numerosStr}) como PAGADO\n\n` +
        `Cliente: ${nombre || 'Sin nombre'}\n\n` +
        `Selecciona método de pago:\n` +
        `1 - Efectivo\n` +
        `2 - Nequi\n` +
        `3 - DaviPlata\n\n` +
        `Método actual: ${metodoPagoActual || 'efectivo'}`,
        metodoPagoActual || 'efectivo'
      );

      if (!metodoPago) return;

      let metodoPagoFinal = metodoPago.toLowerCase();
      if (metodoPago === '1') metodoPagoFinal = 'efectivo';
      if (metodoPago === '2') metodoPagoFinal = 'nequi';
      if (metodoPago === '3') metodoPagoFinal = 'daviplata';

      if (confirm(`¿Confirmas que la boleta ${numerosStr} ha sido PAGADA?\n\nCliente: ${nombre || 'Sin nombre'}\nMétodo: ${metodoPagoFinal}\n\n✅ Se cambiará a estado PAGADO`)) {
        try {
          await db.collection('tickets').doc(docId).update({
            estado: 'pagado',
            metodo_pago: metodoPagoFinal,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
          
          const ticketIndex = todosLosTickets.findIndex(t => t.id === docId);
          if (ticketIndex !== -1) {
            todosLosTickets[ticketIndex].estado = 'pagado';
            todosLosTickets[ticketIndex].metodo_pago = metodoPagoFinal;
            todosLosTickets[ticketIndex].fecha = new Date().toLocaleString();
          }
          
          actualizarEstadisticas();
          alert(`✅ Boleta ${numerosStr} marcada como PAGADO\n💳 Método: ${metodoPagoFinal}`);
          mostrarLista();
          
        } catch (error) {
          console.error('❌ Error marcando como pagado:', error);
          alert('❌ Error: ' + error.message);
        }
      }
    }

    // Reactivar ticket (eliminar)
    async function reactivarTicket(docId, numerosStr, nombre) {
      if (confirm(`¿Estás segura de reactivar la boleta ${numerosStr}?\n\nCliente: ${nombre || 'Sin nombre'}\n\n✅ Se eliminará de la rifa y los números quedarán disponibles.`)) {
        try {
          await db.collection('tickets').doc(docId).delete();
          
          const index = todosLosTickets.findIndex(t => t.id === docId);
          if (index !== -1) todosLosTickets.splice(index, 1);
          
          actualizarEstadisticas();
          alert(`✅ Boleta ${numerosStr} reactivada correctamente.`);
          mostrarLista();
          
        } catch (error) {
          console.error('❌ Error en reactivación:', error);
          alert('❌ Error: ' + error.message);
        }
      }
    }

    // Inicializar
    document.addEventListener('DOMContentLoaded', function() {
      cargarDatos();
      setInterval(cargarDatos, 30000);
    });
  </script>
</body>
</html>
